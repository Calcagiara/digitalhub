{{ range $test := .Values.platformTests.scenarios }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "digitalhub.fullname" $ }}-python-test-{{ $test }}"
  labels:
    {{- include "digitalhub.labels" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  template:
    spec:
      containers:
        - name: python
          image: "{{ $.Values.platformTests.image }}:{{ $.Values.platformTests.tag }}"
          args:
            - "{{ $test }}"
          env:
            - name: OAUTHLIB_INSECURE_TRANSPORT
              value: "True"
            {{- if $.Values.core.s3.enabled }}
            - name: AWS_ACCESS_KEY_ID
              {{- if $.Values.core.s3.credentials.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.core.s3.credentials.existingSecret.name }}
                  key: {{ $.Values.core.s3.credentials.existingSecret.accessKeyKey }}
              {{- else }}
              value: {{ $.Values.core.s3.credentials.accessKey }}
              {{- end }}
            - name: AWS_SECRET_ACCESS_KEY
              {{- if $.Values.core.s3.credentials.existingSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.core.s3.credentials.existingSecret.name }}
                  key: {{ $.Values.core.s3.credentials.existingSecret.secretKeyKey }}
              {{- else }}
              value: {{ $.Values.core.s3.credentials.secretKey }}
              {{- end }}
            {{- end }}
            {{- if $.Values.core.authentication.openId.enabled }}
            - name: "CORE_CLIENT_ID"
              {{- if and $.Values.core.coreAuthCreds.existingSecret.secretName $.Values.core.coreAuthCreds.existingSecret.clientIdKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.core.coreAuthCreds.existingSecret.secretName }}
                  key: {{ $.Values.core.coreAuthCreds.existingSecret.clientIdKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: "core-auth-creds"
                  key: "clientId"
              {{- end }}
            - name: "CORE_CLIENT_SECRET"
              {{- if and $.Values.core.coreAuthCreds.existingSecret.secretName $.Values.core.coreAuthCreds.existingSecret.clientSecretKey }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.core.coreAuthCreds.existingSecret.secretName }}
                  key: {{ $.Values.core.coreAuthCreds.existingSecret.clientSecretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: "core-auth-creds"
                  key: "clientSecret"
              {{- end }}
            - name: "DHCORE_ENDPOINT"
              value: http://{{ $.Release.Name }}-core:{{ $.Values.core.service.port }}
            - name: "DHCORE_ISSUER"
              value: http://{{ $.Release.Name }}-core:{{ $.Values.core.service.port }}
            {{- end }}
            {{- if $.Values.core.authentication.basic.enabled }}
            - name: "DHCORE_USER"
              value: {{ $.Values.core.authentication.basic.username }}
            - name: "DHCORE_PASSWORD"
              value: {{ $.Values.core.authentication.basic.password }}
            {{- end }}
          envFrom:
          - configMapRef:
              name: digitalhub-common-env
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            runAsUser: 8877
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true
        runAsUser: 8877
        fsGroup: 999
        runAsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
  backoffLimit: 0
---
{{ end }}
